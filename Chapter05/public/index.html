<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <title>Email Validation</title>
</head>

<body>
  <div class="container mt-5" style="max-width: 520px;">
    <h1 class="h4 mb-4">Email Validation</h1>

    <!-- Prevent normal form submit (page reload) for now -->
    <form onsubmit="return false;">
      <!-- Email field wrapper: server response will replace this whole div -->
      <div class="mb-3" id="email-field">
        <label class="form-label" for="email">Email address</label>

        <input
          id="email"
          type="email"
          class="form-control"
          name="email"
          autocomplete="email"
          hx-post="/email"
          hx-trigger="keyup changed delay:300ms"
          hx-target="#email-field"
          hx-swap="outerHTML"
        />
        <div class="form-text">We’ll validate this as you type.</div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          name="password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary">
        Submit
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
