<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTMX Wheel Demo</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      h1, h2 {
        margin-top: 20px;
      }

      /* ===================== */
      /* FORM */
      /* ===================== */
      form {
        margin: 15px;
      }

      input, select, button {
        margin: 5px;
        padding: 8px;
      }

      /* ===================== */
      /* WHEEL CONTAINER */
      /* ===================== */
      .wheel-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 40px;
      }

      /* ===================== */
      /* WHEEL */
      /* ===================== */
      #wheel {
        display: none;
        width: 320px;
        height: 320px;
        position: relative;
      }

      /* show while request active */
      #wheel.htmx-request {
        display: block;
      }

      .wheel-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 8px solid #333;

        background: conic-gradient(
          #ff6b6b 0deg 45deg,
          #feca57 45deg 90deg,
          #48dbfb 90deg 135deg,
          #1dd1a1 135deg 180deg,
          #5f27cd 180deg 225deg,
          #ff9ff3 225deg 270deg,
          #54a0ff 270deg 315deg,
          #00d2d3 315deg 360deg
        );

        animation: spin 0.8s linear infinite;
      }

      /* pointer */
      #wheel::after {
        content: "▼";
        position: absolute;
        top: -35px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 32px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ===================== */
      /* RESULT */
      /* ===================== */
      #result {
        margin-top: 30px;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Please enter your details:</h1>

    <!-- FORM 1 -->
    <form method="POST" hx-post="{% url 'sample-post' %}" hx-target="#message">
      {% csrf_token %}

      <input type="text" name="name" placeholder="Name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="color" name="favourite_color" required />

      <select name="age" required>
        <option value="">Select age range</option>
        <option value="Under 10">Under 10</option>
        <option value="11-15">10 - 18</option>
        <option value="19 - 35">20</option>
         <option value="36 - 50">20</option>
        <option value="51+">51+</option>
      </select>

      <button type="submit">Submit</button>
    </form>

    <div id="message"></div>

    <hr />

    <!-- TRY YOUR LUCK -->
    <h2>Spin the wheel 🎡</h2>

    <form
      method="POST"
      hx-post="{% url 'try_my_luck' %}"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-indicator="#wheel"
    >
      {% csrf_token %}
      <button type="submit">Spin</button>
    </form>

    <!-- CENTERED WHEEL -->
    <div class="wheel-container">
      <div id="wheel" class="htmx-indicator">
        <div class="wheel-inner"></div>
      </div>
    </div>

    <!-- RESULT -->
    <div id="result"></div>
  </body>
</html>
