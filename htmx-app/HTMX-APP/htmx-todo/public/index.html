<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTMX Todo</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 1rem;
    }
    input[type="text"] {
      padding: 8px;
      width: 70%;
      font-size: 15px;
    }
    button {
      padding: 8px 12px;
      cursor: pointer;
      margin-left: 4px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <h1>My Todo List</h1>

  <form
    hx-post="/todos"
    hx-target="#todo-list"
    hx-swap="beforeend"
    hx-on="htmx:afterRequest: this.reset()"
  >
    <input type="text" name="text" placeholder="Add a new task..." required />
    <button type="submit">Add</button>
  </form>

  <ul
    id="todo-list"
    hx-get="/todos"
    hx-trigger="load"
    hx-swap="innerHTML"
  ></ul>

</body>
</html>
